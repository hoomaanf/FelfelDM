<!DOCTYPE html>
<html>

<head>
    <meta charset="utf-8">
    <style>
        body {
            width: 260px;
            padding: 15px;
            font-family: sans-serif;
            background: #2d2d30;
            color: #efeff1;
            border-radius: 8px;
        }

        .header {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 15px;
            border-bottom: 1px solid #3d4045;
            padding-bottom: 10px;
        }

        .header img {
            border-radius: 50%;
        }

        .header h3 {
            margin: 0;
            color: #efeff1;
            font-size: 16px;
        }

        #status {
            margin-bottom: 10px;
            padding: 8px;
            border-radius: 4px;
            text-align: center;
            font-weight: bold;
        }

        #status.connected {
            color: #27ae60;
            background: #1a3a2a;
        }

        #status.disconnected {
            color: #e74c3c;
            background: #3a1a1a;
        }

        .option-row {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-top: 10px;
            padding: 10px 14px;
            background: #1e1e20;
            border-radius: 6px;
            justify-content: space-between;
            cursor: pointer;
        }

        .option-row label {
            color: #efeff1;
            font-size: 13px;
            cursor: pointer;
            flex: 1;
        }

        /* Toggle Switch */
        .switch {
            position: relative;
            width: 44px;
            height: 24px;
            flex-shrink: 0;
        }

        .switch input {
            opacity: 0;
            width: 0;
            height: 0;
        }

        .slider {
            position: absolute;
            cursor: pointer;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-color: #e74c3c;
            transition: 0.3s;
            border-radius: 24px;
        }

        .slider::before {
            content: "";
            position: absolute;
            height: 18px;
            width: 18px;
            left: 3px;
            bottom: 3px;
            background-color: #efeff1;
            transition: 0.3s;
            border-radius: 50%;
        }

        .switch input:checked+.slider {
            background-color: #3daee9;
        }

        .switch input:checked+.slider::before {
            transform: translateX(20px);
        }

        .switch input:disabled+.slider {
            opacity: 0.4;
            cursor: not-allowed;
        }

        .status-text {
            font-size: 11px;
            margin-top: 4px;
            padding: 4px 8px;
            border-radius: 4px;
            text-align: center;
        }

        .status-text.active {
            color: #27ae60;
            background: #1a3a2a;
        }

        .status-text.inactive {
            color: #e74c3c;
            background: #3a1a1a;
        }
    </style>
</head>

<body>

    <div class="header">
        <img src="icons/icon48.png" alt="FelfelDM" width="32" height="32">
        <h3>🌶️ FelfelDM</h3>
    </div>

    <div id="status" class="disconnected">Checking...</div>

    <div class="option-row" id="toggleContainer">
        <label for="catchDownloads">🛡️ Catch Downloads</label>
        <div class="switch">
            <input type="checkbox" id="catchDownloads">
            <span class="slider"></span>
        </div>
    </div>
    <div id="catchStatus" class="status-text active">✅ Active</div>

    <script src="popup.js"></script>

</body>

</html>
