<!DOCTYPE html>
<html>

<head>
    <meta charset="utf-8">
    <style>
        body {
            width: 250px;
            padding: 15px;
            font-family: sans-serif;
            background: #2d2d30;
            color: #efeff1;
        }

        .header {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 15px;
            border-bottom: 1px solid #3d4045;
            padding-bottom: 10px;
        }

        .header img {
            border-radius: 50%;
        }

        .header h3 {
            margin: 0;
            color: #efeff1;
            font-size: 16px;
        }

        button {
            width: 100%;
            margin-top: 10px;
            padding: 8px;
            background: #3daee9;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
        }

        button:hover {
            background: #3498db;
        }

        #status {
            margin-bottom: 10px;
            padding: 8px;
            border-radius: 4px;
            text-align: center;
            font-weight: bold;
        }

        #status.connected {
            color: #27ae60;
            background: #1a3a2a;
        }

        #status.disconnected {
            color: #e74c3c;
            background: #3a1a1a;
        }

        .option-row {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-top: 10px;
            padding: 8px;
            background: #1e1e20;
            border-radius: 4px;
        }

        .option-row input[type="checkbox"] {
            accent-color: #3daee9;
            width: 18px;
            height: 18px;
        }
    </style>
</head>

<body>

    <div class="header">
        <img src="icons/icon48.png" alt="FelfelDM" width="32" height="32">
        <h3>🌶️ FelfelDM</h3>
    </div>

    <div id="status" class="disconnected">Checking...</div>

    <div class="option-row">
        <input type="checkbox" id="catchDownloads" checked>
        <label for="catchDownloads">Catch browser downloads</label>
    </div>

    <script src="popup.js"></script>

</body>

</html>
