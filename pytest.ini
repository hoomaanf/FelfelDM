[pytest]
# pytest configuration for FelfelDM

# Test discovery patterns
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Add project root to sys.path
pythonpath = .

# Options
addopts =
    -v
    --tb=short
    --maxfail=1
    --strict-markers

# Markers
markers =
    unit: Unit tests
    integration: Integration tests
    slow: Slow tests
    skip: Skipped tests

# Test directories
testpaths = tests

# Filter warnings
filterwarnings =
    ignore::DeprecationWarning
    ignore::PendingDeprecationWarning

# Timeout for tests
timeout = 30
